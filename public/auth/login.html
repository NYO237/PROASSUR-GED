<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAssur - Connexion</title>
    <!-- Utilisation de CDN pour les tests -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bleu-primary: #0f2c59;
            --bleu-secondary: #1746a2;
            --rouge-accent: #d72323;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            /* Fond cohérent avec la page d'accueil */
            background: linear-gradient(135deg, rgba(15, 44, 89, 0.3) 0%, rgba(23, 70, 162, 0.6) 100%), 
                    url('/ProAssur_Photo.jpeg') no-repeat center center;
            background-size: cover !important;
        }

        .auth-card {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 3rem 2.5rem;
            position: relative;
            overflow: hidden;
        }
        
        /* Liseré supérieur bleu */
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-color: var(--bleu-secondary);
        }

        .logo-container img {
            max-width: 180px;
            margin-bottom: 1.5rem;
        }

        h2.auth-title {
            font-weight: 800;
            color: var(--bleu-primary);
            margin-bottom: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--bleu-primary);
        }

        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: var(--bleu-secondary);
        }

        .form-control {
            border-left: none;
            padding-left: 0;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6; /* Garde la couleur de bordure par défaut de bootstrap */
        }
        
        /* Effet de focus sur le groupe entier */
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(215, 35, 35, 0.15);
            border-radius: 0.375rem;
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: var(--rouge-accent);
        }

        .btn-rouge {
            background-color: var(--rouge-accent);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn-rouge:hover {
            background-color: #b51c1c;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(215, 35, 35, 0.3);
        }

        .auth-link {
            color: var(--bleu-secondary);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .auth-link:hover {
            color: var(--rouge-accent);
        }
        
        /* Style pour les alertes JS existantes */
        .alert-danger {
            font-size: 0.85rem;
            padding: 0.5rem;
            border-radius: 8px;
            background-color: #fff1f2;
            border-color: #ffe4e6;
            color: #e11d48;
        }
    </style>
</head>
<body class="min-vh-100 d-flex justify-content-center align-items-center">

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <!-- Bouton retour -->
                <div class="mb-3">
                    <a href="/" class="text-white text-decoration-none" style="opacity: 0.8;"><i class="fa-solid fa-arrow-left me-2"></i>Retour à l'accueil</a>
                </div>

                <div class="auth-card" id="bloc_connexion">
                    <div class="text-center logo-container">
                        <!-- Remplacer par le bon chemin -->
                        <img src="/ProAssur_LOGO+WafaAssurance4.png" alt="Logo ProAssur" class="img-fluid border-bottom pb-3">
                    </div>
                    
                    <div class="text-center mb-4">
                        <h2 class="auth-title">Connexion</h2>
                        <p class="text-secondary small">Accédez à votre espace client sécurisé.</p>
                    </div>

                    <div class="alert alert-danger p-2 text-center fw-bold" style="display: none;" id="serveur_alert_connexion_container">
                        <span id="serveur_alert_connexion">Erreur de connexion</span>
                    </div>

                    <form action="" method="post" id="formulaire_connexion">
                        
                        <!-- Téléphone -->
                        <div class="mb-3">
                            <label class="form-label" for="tel_connexion">Téléphone <span class="text-secondary fw-normal">(WhatsApp)</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                                <input class="form-control" type="tel" name="tel" id="tel_connexion" placeholder="6 XX XX XX XX">
                            </div>
                            <div class="alert alert-danger mt-1 d-none" id="tel_alert_connexion"></div>
                        </div>
                        
                        <!-- Identifiant -->
                        <div class="mb-3">
                            <label class="form-label" for="identifiant_connexion">Identifiant (Email)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                <input class="form-control" type="email" name="identifiant" id="identifiant_connexion" placeholder="exemple@gmail.com">
                            </div>
                            <div class="alert alert-danger mt-1 d-none" id="identifiant_alert_connexion"></div>
                        </div>
                        
                        <!-- Mot de passe -->
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between" for="mdp_connexion">
                                Mot de passe
                                <a href="#" class="auth-link fw-normal" style="font-size: 0.8rem;">Oublié ?</a>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input class="form-control" type="password" name="mdp" id="mdp_connexion" placeholder="••••••••"> 
                            </div>
                            <div class="alert alert-danger mt-1 d-none" id="mdp_alert_connexion"></div>
                        </div>
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="button" class="btn btn-rouge btn-lg" id="connexion_btn">
                                Se connecter <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button> 
                        </div>
                        
                        <div class="text-center mt-4">
                            <p class="text-secondary small mb-0">Nouveau chez ProAssur ?</p>
                            <a href="/register" class="auth-link" id='lien_connexion'>Créer mon compte</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Script original conservé -->
    <script src="../js/auth-login.js"></script>
</body>
</html>
