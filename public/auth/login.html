<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAssur - Connexion</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts : Synchronisé avec l'accueil -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-900: #0f2c59;
            --blue-600: #1746a2;
            --red-600: #d72323;
            --red-700: #a81c1c;
            --paper: #f5f6fa;
            --ink-900: #10182b;
            --slate-500: #5b6478;
            --line: rgba(15, 44, 89, 0.12);
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--ink-900);
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(135deg, rgba(15, 44, 89, 0.6) 0%, rgba(23, 70, 162, 0.3) 100%), 
                        url('/ProAssur_Photo.jpeg') no-repeat center center;
            background-size: cover !important;
            background-attachment: fixed;
        }

        .auth-card {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            box-shadow: 0 20px 40px rgba(15, 44, 89, 0.15);
            padding: 3rem 2.5rem;
        }

        .logo-container img {
            max-width: 160px;
        }

        h2.auth-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--navy-900);
            margin-bottom: 0.4rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--navy-900);
            margin-bottom: 0.4rem;
        }

        /* Style épuré des groupes d'input */
        .input-group {
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background-color: #f8fafc;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .input-group-text {
            background-color: transparent;
            border: none;
            color: var(--slate-500);
            padding-left: 1rem;
            padding-right: 0.5rem;
        }

        .form-control {
            background-color: transparent;
            border: none;
            padding: 0.7rem 1rem 0.7rem 0.25rem;
            font-size: 0.95rem;
            color: var(--ink-900);
        }

        .form-control:focus {
            box-shadow: none;
            background-color: transparent;
        }
        
        /* Focus moderne et épuré */
        .input-group:focus-within {
            background-color: #fff;
            border-color: var(--red-600);
            box-shadow: 0 0 0 3px rgba(215, 35, 35, 0.12);
        }
        
        .input-group:focus-within .input-group-text {
            color: var(--red-600);
        }

        /* Bouton Rouge - Style de la page d'accueil */
        .btn-rouge {
            background-color: var(--red-600);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: 999px;
            padding: 0.75rem 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .btn-rouge:hover {
            background-color: var(--red-700);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(215, 35, 35, 0.25);
        }

        .auth-link {
            color: var(--blue-600);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }
        .auth-link:hover {
            color: var(--red-600);
        }
        
        /* Style des alertes JS */
        .alert-danger {
            font-size: 0.85rem;
            padding: 0.6rem;
            border-radius: var(--radius-sm);
            background-color: #fff1f2;
            border-color: #ffe4e6;
            color: #e11d48;
        }
    </style>
</head>
<body class="min-vh-100 d-flex justify-content-center align-items-center">

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <!-- Bouton retour -->
                <div class="mb-3">
                    <a href="/" class="text-white text-decoration-none transition-opacity" style="opacity: 0.85; font-size: 0.92rem; font-weight: 500;">
                        <i class="fa-solid fa-arrow-left me-2"></i>Retour à l'accueil
                    </a>
                </div>

                <div class="auth-card" id="bloc_connexion">
                    <div class="text-center logo-container mb-4">
                        <img src="/ProAssur_LOGO+WafaAssurance4.png" alt="Logo ProAssur" class="img-fluid border-bottom pb-3 w-100">
                    </div>
                    
                    <div class="text-center mb-4">
                        <h2 class="auth-title">Connexion</h2>
                        <p class="text-secondary small">Accédez à votre espace client sécurisé.</p>
                    </div>

                    <div class="alert alert-danger p-2 text-center fw-bold" style="display: none;" id="serveur_alert_connexion_container">
                        <span id="serveur_alert_connexion">Erreur de connexion</span>
                    </div>

                    <form action="" method="post" id="formulaire_connexion">
                        
                        <!-- Téléphone -->
                        <div class="mb-3">
                            <label class="form-label" for="tel_connexion">Téléphone <span class="text-secondary fw-normal">(WhatsApp)</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                                <input class="form-control" type="tel" name="tel" id="tel_connexion" placeholder="6 XX XX XX XX">
                            </div>
                            <div class="alert alert-danger mt-1 d-none" id="tel_alert_connexion"></div>
                        </div>
                        
                        <!-- Identifiant -->
                        <div class="mb-3">
                            <label class="form-label" for="identifiant_connexion">Identifiant (Email)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                <input class="form-control" type="email" name="identifiant" id="identifiant_connexion" placeholder="exemple@gmail.com">
                            </div>
                            <div class="alert alert-danger mt-1 d-none" id="identifiant_alert_connexion"></div>
                        </div>
                        
                        <!-- Mot de passe -->
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between" for="mdp_connexion">
                                Mot de passe
                                <a href="#" class="auth-link fw-normal" style="font-size: 0.8rem;">Oublié ?</a>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input class="form-control" type="password" name="mdp" id="mdp_connexion" placeholder="••••••••"> 
                            </div>
                            <div class="alert alert-danger mt-1 d-none" id="mdp_alert_connexion"></div>
                        </div>
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="button" class="btn btn-rouge btn-lg" id="connexion_btn">
                                Se connecter <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button> 
                        </div>
                        
                        <div class="text-center mt-4">
                            <p class="text-secondary small mb-0">Nouveau chez ProAssur ?</p>
                            <a href="/register" class="auth-link" id='lien_connexion'>Créer mon compte</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Script original conservé -->
    <script src="../js/auth-login.js"></script>
</body>
</html>
