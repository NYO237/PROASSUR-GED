<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* Style de la boîte modale */
dialog {
  border: none;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  padding: 20px;
  max-width: 400px;
  text-align: center;
  font-family: sans-serif;
}

/* Style de l'arrière-plan (le reste de la page) */
dialog::backdrop {
  background-color: rgba(0, 0, 0, 0.6); /* Noir transparent */
  backdrop-filter: blur(2px); /* Optionnel : floute l'arrière-plan */
}

/* Espacement des boutons */
.actions {
  margin-top: 20px;
  display: flex;
  justify-content: space-around;
}

/* Style d'un bouton d'action dangereuse */
button.danger {
  background-color: #e74c3c;
  color: white;
  border: none;
  border-radius: 4px;
  padding: 8px 16px;
  cursor: pointer;
}

button.danger:hover {
  background-color: #c0392b;
}
</style>
<body>
    <button id="btnOuvrir">🗑️ Supprimer l'élément</button>

<dialog id="maModale">
  <h3>Confirmation requise</h3>
  <p>Êtes-vous sûr de vouloir supprimer ceci ? Cette action est irréversible.</p>
  
  <div class="actions">
    <button id="btnAnnuler">Annuler</button>
    <button id="btnConfirmer" class="danger">Oui, supprimer</button>
  </div>
</dialog>
</body>

<script>
    // 1. Récupérer les éléments dans le HTML
const btnOuvrir = document.getElementById('btnOuvrir');
const modale = document.getElementById('maModale');
const btnAnnuler = document.getElementById('btnAnnuler');
const btnConfirmer = document.getElementById('btnConfirmer');

// 2. Ouvrir la modale au clic sur le bouton "Supprimer"
btnOuvrir.addEventListener('click', () => {
  modale.showModal(); 
});

// 3. Fermer la modale si on clique sur "Annuler"
btnAnnuler.addEventListener('click', () => {
  modale.close(); 
});

// 4. Action réelle de suppression si on clique sur "Oui, supprimer"
btnConfirmer.addEventListener('click', () => {
  // Placez ici votre code pour supprimer l'élément (ex: appel API, suppression du DOM)
  console.log("L'élément a été supprimé avec succès !");
  
  // Une fois l'action terminée, on ferme la fenêtre
  modale.close();
});
</script>
</html>
